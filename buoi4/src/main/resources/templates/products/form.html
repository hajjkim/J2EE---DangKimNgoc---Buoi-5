<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Product Form</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h3 th:text="${product.id == null ? 'Create Product' : 'Edit Product'}"></h3>

 <form class="mt-3"
      th:action="@{/products/save}"
      th:object="${product}"
      method="post"
      enctype="multipart/form-data">
  <input type="hidden" th:field="*{id}"/>

  <div class="mb-3">
    <label class="form-label">Name</label>
    <input class="form-control" th:field="*{name}" required/>
  </div>

  <div class="mb-3">
    <label class="form-label">Image (Upload)</label>
    <input class="form-control" type="file" name="imageFile" accept="image/*"/>
    <div class="mt-2" th:if="*{image}">
      <img th:src="*{image}" style="max-height:120px" class="border rounded"/>
    </div>
  </div>



  <div class="mb-3">
    <label class="form-label">Price</label>
    <input class="form-control" type="number" step="0.01" th:field="*{price}" required/>
  </div>

  <div class="mb-3">
    <label class="form-label">Category</label>
    <select class="form-select" th:field="*{category.id}">
      <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
    </select>
  </div>

  <button class="btn btn-success" type="submit">Save</button>
  <a class="btn btn-secondary" href="/products">Back</a>
</form>
</div>
</body>
</html>
