<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Products</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="/">Home</a>
  <a class="nav-link text-white" href="/products">Products</a>
  <a class="nav-link text-white" href="/categories">Categories</a>
</nav>

<div class="container mt-4">
  <a class="btn btn-primary mb-3" href="/products/create">Create New Product</a>

  <table class="table table-bordered align-middle">
    <thead>
    <tr>
      <th>#</th>
      <th>Name</th>
      <th>Image</th>
      <th>Price</th>
      <th>Category Name</th>
      <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p, st : ${products}">
      <td th:text="${st.count}"></td>
      <td th:text="${p.name}"></td>
      <td style="width:160px">
        <img th:if="${p.image != null and !#strings.isEmpty(p.image)}"
             th:src="${p.image}"
             style="max-width:140px; max-height:90px" alt="img"/>
      </td>
      <td th:text="${p.price}"></td>
      <td th:text="${p.category != null ? p.category.name : ''}"></td>
      <td style="white-space:nowrap">
        <a class="btn btn-sm btn-secondary" th:href="@{/products/edit/{id}(id=${p.id})}">Edit</a>
        <a class="btn btn-sm btn-danger"
           th:href="@{/products/delete/{id}(id=${p.id})}"
           onclick="return confirm('Delete this product?')">Delete</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
