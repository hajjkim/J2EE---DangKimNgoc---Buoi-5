<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Categories</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-4">
  <h3>Categories</h3>

  <form class="row g-2 mt-3" th:action="@{/categories/save}" th:object="${category}" method="post">
    <div class="col-auto">
      <input class="form-control" th:field="*{name}" placeholder="Category name" required>
    </div>
    <div class="col-auto">
      <button class="btn btn-primary" type="submit">Add</button>
      <a class="btn btn-secondary" href="/products">Back</a>
    </div>
  </form>

  <table class="table table-bordered mt-3">
    <thead><tr><th>#</th><th>Name</th><th>Action</th></tr></thead>
    <tbody>
    <tr th:each="c, st : ${categories}">
      <td th:text="${st.count}"></td>
      <td th:text="${c.name}"></td>
      <td>
        <a class="btn btn-sm btn-danger"
           th:href="@{/categories/delete/{id}(id=${c.id})}"
           onclick="return confirm('Delete?')">Delete</a>
      </td>
    </tr>
    </tbody>
  </table>
</div>
</body>
</html>
